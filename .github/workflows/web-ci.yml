name: Web CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @ainews/web lint

      - name: Typecheck
        run: pnpm --filter @ainews/web exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter @ainews/web test

      - name: Build
        run: pnpm --filter @ainews/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
