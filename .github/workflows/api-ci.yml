name: API CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ainews/api db:generate

      - name: Lint
        run: pnpm --filter @ainews/api lint

      - name: Build
        run: pnpm --filter @ainews/api build

      - name: Unit tests
        run: pnpm --filter @ainews/api test

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: ainews-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ainews-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci

      - name: Scan ${{ matrix.name }} image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
