global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: ainews-api
    metrics_path: /metrics
    static_configs:
      # host.docker.internal - the API runs directly on the host (pnpm dev),
      # not as a container in this compose stack, same reasoning already
      # used for the Docker image smoke tests in infrastructure/k8s/README.md.
      - targets: ["host.docker.internal:4000"]
