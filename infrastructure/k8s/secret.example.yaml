# TEMPLATE ONLY — every value below is a placeholder. Do not fill this in
# and commit it: generate the real Secret out-of-band and apply it directly
# (kubectl apply -f, or better, a secret manager), keeping actual credential
# values out of source control entirely. In order of preference:
#   - A managed secret store (AWS Secrets Manager / GCP Secret Manager /
#     Vault) synced in via the External Secrets Operator, or
#   - Sealed Secrets (bitnami-labs/sealed-secrets) so only an encrypted
#     blob is committed, or
#   - At minimum, `kubectl create secret generic ainews-secrets
#     --from-env-file=.env.production -n ainews-cms` run by hand/CI,
#     never checked in.
apiVersion: v1
kind: Secret
metadata:
  name: ainews-secrets
  namespace: ainews-cms
type: Opaque
stringData:
  # Runtime connection — MUST be a non-superuser role with no BYPASSRLS
  # (see infrastructure/postgres/init.sql's ainews_app role). Postgres
  # superusers unconditionally bypass Row-Level Security, so pointing this
  # at a superuser silently disables tenant isolation with no error.
  DATABASE_URL: "postgresql://ainews_app:REPLACE_ME@postgres:5432/ainews_db"
  # Migration-only connection — needs DDL privileges, so this one IS the
  # superuser/owner role. Never used by the running app itself.
  DIRECT_DATABASE_URL: "postgresql://ainews:REPLACE_ME@postgres:5432/ainews_db"
  DATABASE_USER: "REPLACE_ME"
  DATABASE_PASSWORD: "REPLACE_ME"

  REDIS_URL: "redis://:PASSWORD@redis:6379"
  REDIS_PASSWORD: "REPLACE_ME"

  OPENSEARCH_USERNAME: "REPLACE_ME"
  OPENSEARCH_PASSWORD: "REPLACE_ME"

  JWT_SECRET: "REPLACE_ME_64_CHAR_RANDOM_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_ME_64_CHAR_RANDOM_SECRET"
  SESSION_SECRET: "REPLACE_ME"
  CSRF_SECRET: "REPLACE_ME"
  ENCRYPTION_KEY: "REPLACE_ME_32_CHAR_MINIMUM"
  WEBHOOK_SECRET: "REPLACE_ME"

  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""

  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  S3_PUBLIC_URL: "https://cdn.example.com"
  CDN_URL: ""

  SMTP_USER: "REPLACE_ME"
  SMTP_PASSWORD: "REPLACE_ME"

  OPENAI_API_KEY: ""
  GOOGLE_AI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENROUTER_API_KEY: ""

  NEWSAPI_KEY: ""
  GNEWS_API_KEY: ""
  MEDIASTACK_KEY: ""
  BING_NEWS_KEY: ""

  SENTRY_DSN: ""
