apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ainews-cms
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ainews-web:latest
          ports:
            - containerPort: 3100
          envFrom:
            - configMapRef:
                name: ainews-config
          readinessProbe:
            httpGet:
              path: /login
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
